spring:
  application:
    name: green-robot-monitor

  datasource:
    url: jdbc:sqlite:../data/green_robot.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 5501
  servlet:
    context-path: /api

# 飞书Webhook配置
feishu:
  webhook:
    url: ${FEISHU_WEBHOOK_URL:}

logging:
  level:
    com.greenrobot.monitor: INFO
    org.hibernate.SQL: DEBUG
