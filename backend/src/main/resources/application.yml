spring:
  application:
    name: green-robot-monitor

  datasource:
    url: jdbc:sqlite:../data/green_robot.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # 静态文件配置
  web:
    resources:
      static-locations: file:../data/captures/,classpath:/static/

server:
  port: 5501
  servlet:
    context-path: /api

# 摄像头配置
camera:
  enabled: true
  index: 0
  image-dir: ../data/captures

# 飞书Webhook配置
feishu:
  webhook:
    url: ${FEISHU_WEBHOOK_URL:}

# YOLOv8模型配置
model:
  enabled: true
  path: models/yolov8n-leaf.onnx
  conf-threshold: 0.5
  iou-threshold: 0.45
  max-det: 100

logging:
  level:
    com.greenrobot.monitor: INFO
    org.hibernate.SQL: DEBUG
