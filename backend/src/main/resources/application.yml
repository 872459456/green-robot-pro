# =====================================================
# 办公室绿萝 Pro - 主配置文件
# =====================================================
# 默认使用 SQLite 数据源
# 切换到 MySQL: 
#   java -jar app.jar --spring.profiles.active=mysql
# =====================================================

spring:
  application:
    name: green-robot-monitor
  profiles:
    active: default  # default 或 mysql

  datasource:
    url: jdbc:sqlite:D:/works/Project/green-robot-monitor-v3/data/green_robot_v3.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # 静态文件配置
  web:
    resources:
      static-locations: file:../data/captures/,classpath:/static/

server:
  port: 5501
  servlet:
    context-path: /api

# 摄像头配置
camera:
  enabled: true
  index: 0
  image-dir: ../data/captures

# 飞书Webhook配置
feishu:
  webhook:
    url: ${FEISHU_WEBHOOK_URL:}

# YOLOv8模型配置
model:
  enabled: true
  path: models/yolov8n.onnx
  conf-threshold: 0.5
  iou-threshold: 0.45
  max-det: 100

# OSS对象存储配置
oss:
  enabled: true
  endpoint: http://localhost:9000
  bucket: green-robot-captures
  access-key: admin
  secret-key: greenrobot123
  local-dir: ../data/captures

logging:
  level:
    com.greenrobot.monitor: INFO
    org.hibernate.SQL: DEBUG
